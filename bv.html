<!DOCTYPE html>
<html>
<head>

<style>
body {
  font-family: Arial;
  background: #f0fff4;
  margin: 0;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 20px;
}

.post {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 15px;
  box-shadow: 0 5px 10px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.post:hover {
  transform: scale(1.02);
}

h1 {
  text-align: center;
}
</style>
</head>

<body>

<div class="container">
  <h1>📖 Blog dễ thương</h1>

  <div class="post">
    <h3>🌸 Bài viết 1</h3>
    <p>Đây là nội dung bài viết của bạn...</p>
  </div>

  <div class="post">
    <h3>💫 Bài viết 2</h3>
    <p>Viết thêm nội dung ở đây...</p>
  </div>

  <a href="index.html">⬅ Quay lại</a>
</div>

</body>
</html>
