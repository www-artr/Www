<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quản lý nhạc</title>

<style>
body {
  font-family: Arial;
  background: #e0f7fa;
  text-align: center;
}

.container {
  padding: 20px;
}

input {
  padding: 10px;
  width: 80%;
  border-radius: 10px;
  border: none;
}

button {
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  background: #00bcd4;
  color: white;
  margin: 10px;
  cursor: pointer;
}

.card {
  background: white;
  margin: 10px;
  padding: 15px;
  border-radius: 15px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🎶 Thêm nhạc + tạo code</h1>

  <input id="linkInput" placeholder="Dán link .mp3">
  <br>
  <button onclick="addMusic()">Thêm nhạc</button>

  <div id="list"></div>

  <a href="index.html">⬅ Quay lại</a>
</div>

<script>
let list = JSON.parse(localStorage.getItem("musicList")) || [];

function randomCode() {
  let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
  let code = "";
  for (let i = 0; i < 8; i++) {
    code += chars[Math.floor(Math.random() * chars.length)];
  }
  return code;
}

function addMusic() {
  let link = document.getElementById("linkInput").value;

  if (!link.includes(".mp3")) {
    alert("❌ Phải là link .mp3!");
    return;
  }

  let code = randomCode();

  list.push({ link, code });

  localStorage.setItem("musicList", JSON.stringify(list));

  render();
}

function render() {
  let html = "";

  list.forEach((m, i) => {
    html += `
      <div class="card">
        🎵 Bài ${i+1}<br>
        <audio controls src="${m.link}"></audio><br>
        🔑 Code: <b>${m.code}</b>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

render();
</script>

</body>
</html>
