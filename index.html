<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trang chính</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  text-align:center;
}

nav a{
  margin:10px;
  color:#00eaff;
  text-decoration:none;
  font-size:18px;
}

canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

footer{
  position:fixed;
  bottom:0;
  width:100%;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<h1>🌌 Trang lưu trữ cá nhân</h1>

<nav>
  <a href="anh.html">Ảnh</a>
  <a href="video.html">Video</a>
  <a href="btv.html">Bình luận</a>
</nav>

<script>
const c=document.getElementById("bg");
const ctx=c.getContext("2d");

c.width=innerWidth;
c.height=innerHeight;

let particles=[];

for(let i=0;i<80;i++){
  particles.push({
    x:Math.random()*c.width,
    y:Math.random()*c.height,
    r:Math.random()*3
  });
}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);

  ctx.fillStyle="#00ffff";

  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();

    p.y -= 1;

    if(p.y < 0){
      p.y = c.height;
    }
  });

  requestAnimationFrame(draw);
}

draw();
</script>

<footer>@ 2026 ©</footer>

</body>
</html>
