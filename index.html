<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tải nhạc bằng code</title>

<style>
body {
  font-family: Arial;
  background: #ffe4ec;
  text-align: center;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 20px;
}

input {
  padding: 10px;
  width: 80%;
  border-radius: 10px;
  border: none;
}

button {
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  background: #ff6f91;
  color: white;
  margin-top: 10px;
  cursor: pointer;
}

.result {
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🎵 Nhập code để tải nhạc</h1>

  <a href="nhac.html">➡ Xem nhạc</a>

  <br><br>

  <input id="codeInput" placeholder="Nhập code (VD: GHtyP744)">
  <br>
  <button onclick="findMusic()">Tải nhạc ⬇</button>

  <div class="result" id="result"></div>
</div>

<script>
let list = JSON.parse(localStorage.getItem("musicList")) || [];

function findMusic() {
  let code = document.getElementById("codeInput").value;

  let found = list.find(m => m.code === code);

  if (!found) {
    document.getElementById("result").innerHTML = "❌ Không tìm thấy nhạc";
    return;
  }

  document.getElementById("result").innerHTML = `
    🎧 Đã tìm thấy!<br>
    <audio controls src="${found.link}"></audio><br>
    <button onclick="download('${found.link}')">⬇ Tải</button>
  `;
}

function download(link) {
  let a = document.createElement("a");
  a.href = link;
  a.download = "music.mp3";
  a.click();
}
</script>

</body>
</html>
