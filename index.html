<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>首頁</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family: Arial;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  text-align:center;
  padding:20px;
}

h1{
  margin-bottom:20px;
  font-size:22px;
}

nav{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}

nav a{
  padding:10px 15px;
  border-radius:12px;
  background:#00eaff20;
  color:#00eaff;
  text-decoration:none;
  font-size:14px;
}

canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

footer{
  position:fixed;
  bottom:5px;
  width:100%;
  font-size:12px;
  opacity:0.7;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<h1>🌌 個人檔案</h1>

<nav>
  <a href="anh.html">Ảnh</a>
  <a href="video.html">Video</a>
  <a href="btv.html">Bình luận</a>
</nav>

<script>
const c=document.getElementById("bg");
const ctx=c.getContext("2d");

c.width=innerWidth;
c.height=innerHeight;

// ít hạt hơn
let particles=[];

for(let i=0;i<40;i++){
  particles.push({
    x:Math.random()*c.width,
    y:Math.random()*c.height,
    r:Math.random()*2,
    speed: Math.random()*0.3 + 0.2 // chậm hơn
  });
}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);

  ctx.fillStyle="#00ffff";

  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();

    p.y -= p.speed;

    if(p.y < 0){
      p.y = c.height;
    }
  });

  requestAnimationFrame(draw);
}

draw();
</script>

<footer>@ 2026 ©</footer>

</body>
</html>
