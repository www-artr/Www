<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>評論</title>

<style>
body{
  background:#000;
  color:white;
  text-align:center;
  padding:15px;
}

textarea{
  width:90%;
  height:80px;
  border-radius:10px;
}

button{
  margin-top:10px;
  padding:8px 15px;
  border:none;
  border-radius:10px;
  background:#00eaff;
}

#comments div{
  margin-top:10px;
  padding:10px;
  background:#111;
  border-radius:10px;
}
</style>
</head>

<body>

<h2>💬 評論與FDT</h2>

<textarea id="input" placeholder="Dán code ảnh/video..."></textarea><br>

<button onclick="addComment()">Gửi</button>

<div id="comments"></div>

<script>
function loadComments(){
  let data = JSON.parse(localStorage.getItem('comments') || '[]');
  data.forEach(renderComment);
}

function renderComment(val){
  let div = document.createElement('div');
  div.innerHTML = val;
  document.getElementById('comments').appendChild(div);
}

function addComment(){
  let input = document.getElementById('input');
  let val = input.value;

  if(!val.trim()) return;

  let data = JSON.parse(localStorage.getItem('comments') || '[]');
  data.push(val);

  localStorage.setItem('comments', JSON.stringify(data));

  renderComment(val);
  input.value = "";
}

loadComments();
</script>

<h3>📢 BDT</h3>
<p>Trang đang cập nhật...</p>

</body>
</html>
